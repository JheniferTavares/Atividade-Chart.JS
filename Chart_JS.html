<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade_ChartJS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<center>
    <h1>Olá, seja bem-vindo(a)!</h1>

        <h2 style="color: brown;">Gráfico de Linha</h2>
            <canvas id="chartLinha"></canvas>
        
        <h2 style="color: brown;">Gráfico de Barra</h2>
            <canvas id="chartBarra"></canvas>
</center>
</body>

<script>

  const ctxLinha = document.getElementById('chartLinha');

    new Chart(ctxLinha, {
        type: 'line',
        data: {
        labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
        datasets: [
        {
          label: 'Temperatura',
          data: [30, 29, 28, 25, 22, 23],
          borderWidth: 1
        },

        {
          label: 'Umidade',
          data: [80, 82, 80, 85, 80, 83],
          borderWidth: 1
        }
      ]
    },

    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });

  const ctxBarra = document.getElementById('chartBarra');

    new Chart(ctxBarra, {
        type: 'bar',
        data: {
        labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
        datasets: [
        {
          label: 'Temperatura Média',
          data: [22, 24, 27, 23, 20, 18],
          borderWidth: 1,
        },

        {
          label: 'Umidade Média',
          data: [90, 89, 93, 87, 88, 82],
          borderWidth: 1
        }
      ]
    },

    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });

</script>

</html>
